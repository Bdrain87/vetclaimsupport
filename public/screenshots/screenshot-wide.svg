<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="256" height="720" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <rect x="16" y="16" width="224" height="56" rx="12" fill="#1e293b"/>
  <text x="128" y="52" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="16" font-weight="bold">Vet Claim Support</text>
  <!-- Nav items -->
  <rect x="16" y="88" width="224" height="44" rx="8" fill="#3b82f6" fill-opacity="0.1"/>
  <text x="48" y="116" fill="#3b82f6" font-family="system-ui" font-size="14">Dashboard</text>
  <rect x="16" y="140" width="224" height="44" rx="8" fill="transparent"/>
  <text x="48" y="168" fill="#94a3b8" font-family="system-ui" font-size="14">Rating Calculator</text>
  <rect x="16" y="192" width="224" height="44" rx="8" fill="transparent"/>
  <text x="48" y="220" fill="#94a3b8" font-family="system-ui" font-size="14">Secondary Finder</text>
  <!-- Main content -->
  <rect x="280" y="24" width="480" height="160" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="520" y="80" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="20" font-weight="bold">Welcome Back, Veteran</text>
  <text x="520" y="110" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="14">Track your claim progress and evidence</text>
  <text x="520" y="160" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="32" font-weight="bold">70% Combined Rating</text>
  <!-- Stats cards -->
  <rect x="280" y="200" width="230" height="120" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="530" y="200" width="230" height="120" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="280" y="340" width="480" height="200" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Right panel -->
  <rect x="784" y="24" width="472" height="516" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1020" y="64" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="18" font-weight="bold">Claim Tools</text>
  <rect x="800" y="88" width="440" height="60" rx="8" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.3"/>
  <rect x="800" y="160" width="440" height="60" rx="8" fill="#0f172a"/>
  <rect x="800" y="232" width="440" height="60" rx="8" fill="#0f172a"/>
  <rect x="800" y="304" width="440" height="60" rx="8" fill="#0f172a"/>
</svg>

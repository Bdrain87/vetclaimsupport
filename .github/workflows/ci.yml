name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — zero errors
        run: npx tsc --noEmit

      - name: ESLint — zero errors
        run: npx eslint src/ --max-warnings 0

      - name: Tests — 100% pass rate
        run: npx vitest run

      - name: Production build — zero errors
        run: npx vite build

      - name: Bundle size check
        run: |
          MAX_SIZE_KB=2000
          DIST_SIZE=$(du -sk dist/ | cut -f1)
          echo "dist/ size: ${DIST_SIZE}KB (max: ${MAX_SIZE_KB}KB)"
          if [ "$DIST_SIZE" -gt "$MAX_SIZE_KB" ]; then
            echo "::warning::Bundle size ${DIST_SIZE}KB exceeds ${MAX_SIZE_KB}KB budget"
          fi

      - name: Security — zero high/critical vulnerabilities
        run: npm audit --audit-level=high

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project="iPhone 14"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — zero errors
        run: npx tsc --noEmit

      - name: ESLint — zero errors
        run: npx eslint src/ --max-warnings 0

      - name: Tests — 100% pass rate
        run: npx vitest run

      - name: Production build — zero errors
        run: npx vite build

      - name: Security — zero high/critical vulnerabilities
        run: npm audit --audit-level=high
